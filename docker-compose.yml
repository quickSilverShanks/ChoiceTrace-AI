version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: carbonnudge_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: carbonnudge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbonnudge_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/carbonnudge
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SECRET_KEY=carbonnudge-ai-super-secret-key-for-development-only
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbonnudge_frontend
    restart: always
    ports:
      - "3000:8080"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
